<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Q4 Seatwork 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body{
            background-image: url(https://i.pinimg.com/736x/0a/b5/ab/0ab5abc1d9aae13fed9577be5a51e7c4.jpg);
            background-size: 1400px;
        }

    details{
        font-family: 'Courier New', Courier, monospace;
        text-align: center;
    }

    h2{
        font-family: 'Courier New', Courier, monospace;
    }

    input{
        font-family: 'Courier New', Courier, monospace;
    }

    .btn-custom{
            background-color: rgb(137, 182, 251);
    color: #ffffff;
    border-radius: 30px;
    border:  #ffffff;
    font-family: 'Courier New', Courier, monospace;
    }
     .btn-customs{
            background-color: #ffffff;
    color: rgb(137, 182, 251);
    border-radius: 30px;
    border:rgb(255, 252, 227);
    font-family: 'Courier New', Courier, monospace;
        }

    label{
        font-family: 'Courier New', Courier, monospace;
    }

    footer {
    text-align: center;
    padding: 10px;
    margin-top: 20px;
    font-size: 12px;
    color:rgb(137, 182, 251);
    width: 100%;
}
p{
    font-family: 'Courier New', Courier, monospace;
}



    </style>
</head>
<body>

  <div class="container-fluid d-flex justify-content-center align-items-center">

    <div class="p-5 mt-5 shadow-lg login-box"
      style="width: 500px; background: rgba(195, 197, 204, 0.35); color:  rgb(137, 182, 251); border-radius: 20px;">

      <h2 class="text-center fw-bold">LogIn</h2>

     <details ontoggle="message1()">
        <summary><u>Instructions</u></summary>
        <i id="message"></i>
    </details>

     <label>Username</label>
    <input type="text" id="user" class="form-control mb-3" placeholder="Enter here">

    <label>Password</label>
    <input type="password" id="pass" class="form-control mb-3" placeholder="********">

    <div class="form-check mb-3 text-start">
  <input class="form-check-input" type="checkbox" id="stay">
  <label class="form-check-label">
    Stay logged in
    <p style="font-size: 12px; color: rgb(137, 182, 251);">
        You will stay logged in on this device.
    </p>
  </label>
</div>

<button class="btn-custom fw-bold w-100 mb-2" onclick="login()">
  LogIn
</button>

<button class="btn-customs w-100" onclick="cancelForm()">
  CANCEL
</button>

<br>
<p style="text-decoration: underline; color: rgb(137, 182, 251);">
    Forgot Username/Password?
</p>

    </div>
  </div>


  <script>

     function message1(){
            document.getElementById('message').innerHTML = "FILL OUT ALL REQUIRED BOXES.";
        }
     function login(){
        var username = document.getElementById("user").value;
        var password = document.getElementById("pass").value;

        if (username == "XoKitty" && password == "LaraJean"){
            alert("Access Granted! Welcome Back, " + username + "!");
        }
        
        else {
            alert("Access Denied! Incorrect username and/or password. Please try again.");
        }
     }

    function cancelForm() {
      alert("FORM CANCELLED! ANO BA, BAT MO CINANCEL!!");
    }
  </script>

 <footer>
      © 2026 OBMC LogIn System | All Rights Reserved
  </footer>
</body>
</html>
